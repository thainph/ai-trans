<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>AI Translator</h1>

    <div class="section">
      <label>Provider</label>
      <div class="provider-tabs">
        <button class="provider-tab active" data-provider="openai">OpenAI</button>
        <button class="provider-tab" data-provider="ollama">Ollama</button>
      </div>
    </div>

    <div id="openaiSettings" class="section">
      <label for="apiKey">API Key</label>
      <div class="key-row">
        <input
          type="password"
          id="apiKey"
          placeholder="sk-..."
          autocomplete="off"
        />
        <button id="toggleKey" title="Show/Hide">👁</button>
      </div>
      <label for="openaiModel">Model</label>
      <select id="openaiModel" class="select-field">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4-turbo">gpt-4-turbo</option>
        <option value="gpt-4.1-nano">gpt-4.1-nano</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-4.1">gpt-4.1</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
      </select>
      <button id="saveKey" class="btn-primary" style="margin-top: 8px">Save</button>
    </div>

    <div id="ollamaSettings" class="section hidden">
      <label for="ollamaUrl">Ollama URL</label>
      <input
        type="text"
        id="ollamaUrl"
        class="input-field"
        placeholder="http://localhost:11434"
      />
      <label for="ollamaModel" style="margin-top: 8px">Model</label>
      <div class="model-row">
        <select id="ollamaModel" class="select-field">
          <option value="">-- Load models --</option>
        </select>
        <button id="refreshOllama" class="btn-icon" title="Refresh models">&#x21bb;</button>
      </div>
      <button id="saveOllama" class="btn-primary" style="margin-top: 8px">Save</button>
    </div>

    <div class="section">
      <label>Translation Style</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="style" value="casual" checked />
          <span>Casual</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="style" value="polite" />
          <span>Polite</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="style" value="business" />
          <span>Business</span>
        </label>
      </div>
    </div>

    <div class="section">
      <label for="targetLang">Target Language</label>
      <select id="targetLang" class="select-field">
        <option value="vietnamese">Vietnamese (Tiếng Việt)</option>
        <option value="english">English</option>
        <option value="japanese">Japanese (日本語)</option>
        <option value="chinese">Chinese (中文)</option>
        <option value="korean">Korean (한국어)</option>
        <option value="french">French (Français)</option>
        <option value="german">German (Deutsch)</option>
        <option value="spanish">Spanish (Español)</option>
        <option value="portuguese">Portuguese (Português)</option>
        <option value="russian">Russian (Русский)</option>
        <option value="thai">Thai (ไทย)</option>
        <option value="indonesian">Indonesian (Bahasa)</option>
        <option value="italian">Italian (Italiano)</option>
        <option value="dutch">Dutch (Nederlands)</option>
        <option value="arabic">Arabic (العربية)</option>
        <option value="hindi">Hindi (हिन्दी)</option>
      </select>
    </div>

    <div class="section">
      <button id="translatePage" class="btn-translate-page">Translate This Page</button>
    </div>

    <div id="status" class="status hidden"></div>

    <p class="hint">Select text on any page to translate!</p>

    <script src="popup.js"></script>
  </body>
</html>
